version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: futureshield
      POSTGRES_PASSWORD: futureshield_secret
      POSTGRES_DB: futureshield
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U futureshield"]
      interval: 5s
      timeout: 5s
      retries: 5

  futureshield:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - FUTURESHIELD_DB_URL=postgresql://futureshield:futureshield_secret@db:5432/futureshield
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-}
      - PYTHONUNBUFFERED=1
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/status')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
